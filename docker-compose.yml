  BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
  ALLOW_PLAINTEXT_BACKUP: ${ALLOW_PLAINTEXT_BACKUP:-false}
  CAPTCHA_MODEL_AUTO_DOWNLOAD: ${CAPTCHA_MODEL_AUTO_DOWNLOAD:-false}
  CAPTCHA_MODEL_REQUIRE_CHECKSUM: ${CAPTCHA_MODEL_REQUIRE_CHECKSUM:-true}
  CAPTCHA_MODEL_SHA256_OCR_ONNX: ${CAPTCHA_MODEL_SHA256_OCR_ONNX:-}
  CAPTCHA_MODEL_SHA256_YOLOV5N_ONNX: ${CAPTCHA_MODEL_SHA256_YOLOV5N_ONNX:-}
  TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
  TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
  DATABASE_POOL_RECYCLE_SECONDS: ${DATABASE_POOL_RECYCLE_SECONDS:-1800}
  DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-30}
  SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Shanghai}
  SCHEDULER_LOAD_PAGE_SIZE: ${SCHEDULER_LOAD_PAGE_SIZE:-500}
  SCHEDULER_JITTER_SECONDS: ${SCHEDULER_JITTER_SECONDS:-600}
  SCHEDULER_REPORT_JITTER_SECONDS: ${SCHEDULER_REPORT_JITTER_SECONDS:-0}
  CLOCKIN_MAKEUP_BATCH_DELAY_SECONDS: ${CLOCKIN_MAKEUP_BATCH_DELAY_SECONDS:-2}
  CLOCKIN_MAKEUP_RATE_LIMIT_RETRIES: ${CLOCKIN_MAKEUP_RATE_LIMIT_RETRIES:-3}
  CLOCKIN_MAKEUP_RATE_LIMIT_RETRY_SECONDS: ${CLOCKIN_MAKEUP_RATE_LIMIT_RETRY_SECONDS:-10}
  CLOCKIN_MAKEUP_RATE_LIMIT_COOLDOWN_SECONDS: ${CLOCKIN_MAKEUP_RATE_LIMIT_COOLDOWN_SECONDS:-60}
  MOGUDING_IP_RESTRICT_COOLDOWN_SECONDS: ${MOGUDING_IP_RESTRICT_COOLDOWN_SECONDS:-600}
  BATCH_JOB_MAX_USERS: ${BATCH_JOB_MAX_USERS:-200}
  BATCH_TENANT_MAX_ACTIVE_JOBS: ${BATCH_TENANT_MAX_ACTIVE_JOBS:-5}
  IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-604800}
  MOGUDING_PROXY_API_URL: ${MOGUDING_PROXY_API_URL:-}
  MOGUDING_PROXY_ALLOWED_HOSTS: ${MOGUDING_PROXY_ALLOWED_HOSTS:-}
  ALLOW_PRIVATE_MOGUDING_PROXY_ENDPOINTS: ${ALLOW_PRIVATE_MOGUDING_PROXY_ENDPOINTS:-false}
  MOGUDING_PROXY_TTL_SECONDS: ${MOGUDING_PROXY_TTL_SECONDS:-55}
  MOGUDING_PROXY_API_TIMEOUT_SECONDS: ${MOGUDING_PROXY_API_TIMEOUT_SECONDS:-10}
  MOGUDING_PROXY_URLS: ${MOGUDING_PROXY_URLS:-}
  REPORT_MAKEUP_BATCH_DELAY_SECONDS: ${REPORT_MAKEUP_BATCH_DELAY_SECONDS:-2}
  GEOCODE_SEARCH_PROVIDER: ${GEOCODE_SEARCH_PROVIDER:-mapchaxun}
  GEOCODE_PROVIDER: ${GEOCODE_PROVIDER:-osm}
  BAIDU_MAP_AK: ${BAIDU_MAP_AK:-}
  BAIDU_MAP_COORD_TYPE: ${BAIDU_MAP_COORD_TYPE:-gcj02ll}
  BAIDU_MAP_INPUT_COORD_TYPE: ${BAIDU_MAP_INPUT_COORD_TYPE:-}
  BAIDU_MAP_OUTPUT_COORD_TYPE: ${BAIDU_MAP_OUTPUT_COORD_TYPE:-}
  AMAP_KEY: ${AMAP_KEY:-}
  APP_SECRET: ${APP_SECRET:?Set APP_SECRET in .env}
  USER_PASSWORD_KEY: ${USER_PASSWORD_KEY:?Set USER_PASSWORD_KEY in .env}
  ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME in .env}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}

x-app-common: &app-common
  build: .
  image: automoguding-saas:local
  volumes:
    - ./data/images:/app/server/images
  restart: unless-stopped

services:
  app:
    <<: *app-common
    ports:
      - "${APP_PORT:-8147}:8147"
    environment:
      <<: *app-env
      APP_ROLE: api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8147/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    <<: *app-common
    environment:
      <<: *app-env
      APP_ROLE: worker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8147/readyz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
