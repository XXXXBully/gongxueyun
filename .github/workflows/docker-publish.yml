name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: |
          GHCR_IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "GHCR_IMAGE_NAME=${GHCR_IMAGE_NAME}" >> "$GITHUB_ENV"
          if [ -n "${DOCKERHUB_REPOSITORY}" ]; then
            echo "DOCKERHUB_IMAGE_NAME=${DOCKERHUB_REPOSITORY}" >> "$GITHUB_ENV"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            echo "DOCKERHUB_IMAGE_NAME=${DOCKERHUB_USERNAME}/${REPO_NAME,,}" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
            name=${{ env.DOCKERHUB_IMAGE_NAME }},enable=${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: |
            DOWNLOAD_MODELS=0
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
